workflows:
  ios-native-build:
    name: iOS Native Build (Production)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      # 🔥 HARD FIX PROJECT SIGNING (THIS IS THE REAL FIX)
      - name: Fix Xcode signing settings
        script: |
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' ios/*.xcodeproj/project.pbxproj
          sed -i '' 's/ProvisioningStyle = Manual;/ProvisioningStyle = Automatic;/g' ios/*.xcodeproj/project.pbxproj

      - name: Build iOS app
        script: |
          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme $(ls ios | grep .xcodeproj | sed 's/.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            DEVELOPMENT_TEAM=QNP2XD3FM5 \
            archive

      - name: Export IPA (APP STORE)
        script: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build

    artifacts:
      - build/*.ipa