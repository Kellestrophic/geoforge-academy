workflows:
  ios-native-build:
    name: iOS Production Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ZACHARY MASON KELLER

    environment:
      groups:
        - app_store
        - sentry

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.galanisgalactus.geoforgeacademy

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          export SENTRY_AUTH_TOKEN="$SENTRY_AUTH_TOKEN"
          export SENTRY_ORG="head-knight-studios"
          export SENTRY_PROJECT="geoforge"

          echo "Sentry token length: ${#SENTRY_AUTH_TOKEN}"
          echo "Sentry org: $SENTRY_ORG"
          echo "Sentry project: $SENTRY_PROJECT"

          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          SCHEME=$(basename ios/*.xcodeproj .xcodeproj)

          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"

      - name: Upload to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)

          echo "Uploading IPA: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey $APP_STORE_CONNECT_API_KEY \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

    artifacts:
      - build/ios/ipa/*.ipa