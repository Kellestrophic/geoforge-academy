workflows:
  ios-native-build:
    name: iOS Production Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: ZACHARY MASON KELLER

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.galanisgalactus.geoforgeacademy

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Run Expo Prebuild
        script: |
          npx expo prebuild

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1)
          SCHEME=$(basename ios/*.xcodeproj .xcodeproj)

          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"

      # 🔥 NEW: DIRECT UPLOAD (REPLACES BROKEN PUBLISHING)
      - name: Upload to App Store Connect
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)

          echo "Uploading IPA: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey $APP_STORE_CONNECT_API_KEY \
            --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

    artifacts:
      - build/ios/ipa/*.ipa