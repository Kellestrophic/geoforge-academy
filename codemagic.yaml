workflows:
  ios-native-build:
    name: iOS Native Build (Production)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Fix signing settings (CRITICAL STEP)
        script: |
          /usr/libexec/PlistBuddy -c "Set :objects:$(/usr/libexec/PlistBuddy -c "Print :rootObject" ios/*.xcodeproj/project.pbxproj):attributes:TargetAttributes:$(/usr/libexec/PlistBuddy -c "Print :rootObject" ios/*.xcodeproj/project.pbxproj):DevelopmentTeam QNP2XD3FM5" ios/*.xcodeproj/project.pbxproj || true

      - name: Build iOS app
        script: |
          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme $(ls ios | grep .xcodeproj | sed 's/.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            DEVELOPMENT_TEAM=QNP2XD3FM5 \
            CODE_SIGN_STYLE=Automatic \
            archive

      - name: Export IPA (APP STORE)
        script: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build

    artifacts:
      - build/*.ipa