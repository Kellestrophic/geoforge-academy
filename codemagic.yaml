workflows:
  ios-native-build:
    name: iOS Production Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    # ✅ THIS CONNECTS YOUR API KEY
    integrations:
      app_store_connect: ZACHARY MASON KELLER

    # ✅ THIS FIXES YOUR SIGNING (MOST IMPORTANT)
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.galanisgalactus.geoforgeacademy

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Run Expo Prebuild
        script: |
          npx expo prebuild

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      # 🔥 REQUIRED — THIS WAS MISSING BEFORE
      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/*.xcworkspace" \
            --scheme "$(ls ios | grep .xcodeproj | sed 's/.xcodeproj//')"

    artifacts:
      - build/ios/ipa/*.ipa

    # ✅ THIS IS WHAT YOU JUST POSTED (UPLOAD STEP)
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true