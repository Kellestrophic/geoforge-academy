workflows:
  ios-native-build:
    name: iOS Native Build (Production)
    max_build_duration: 60

    environment:
      node: 18
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install Expo CLI
        script: |
          npm install -g expo-cli

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS app (FINAL FIX)
        script: |
          # Get provisioning profile path installed by Codemagic
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -n 1)

          echo "Using provisioning profile: $PROFILE_PATH"

          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme $(ls ios | grep .xcodeproj | sed 's/.xcodeproj//') \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            DEVELOPMENT_TEAM=QNP2XD3FM5 \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE="$PROFILE_PATH" \
            archive

      - name: Export IPA (APP STORE)
        script: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $PWD/build

    artifacts:
      - build/*.ipa